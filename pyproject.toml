[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hass-surepetcare"
version = "0.0.0"
description = "Hass component library for SurePetcare API"
authors = [
    { name = "FredrikM97" }
]
license = { text = "MIT" }
readme = "README.md"

[project.optional-dependencies]
dev = [
    "homeassistant",
    "py-surepetcare@git+https://github.com/FredrikM97/py-surepetcare@0.5.8",
    "pytest",
    "pytest-homeassistant-custom-component>=0.13.287",
    "pre-commit"
]

[tool.setuptools.packages.find]
include = ["custom_components.surepcha*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.mypy]
ignore_missing_imports = true