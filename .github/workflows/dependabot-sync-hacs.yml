name: Dependabot Sync HACS Home Assistant

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  sync-hacs-homeassistant:
    if: |
      github.repository_owner == 'FredrikM97' &&
      github.actor == 'dependabot[bot]' &&
      contains(github.event.pull_request.head.ref, 'pytest-homeassistant-custom-component')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dependabot branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Sync hacs.json homeassistant
        shell: bash
        run: |

          dep_ver=$(grep -oE 'pytest-homeassistant-custom-component==[^" ]+' pyproject.toml | head -1 | cut -d= -f3)
          [[ -n "$dep_ver" ]] || { echo "Dependency version not found"; exit 0; }

          req=$(curl -fsSL "https://pypi.org/pypi/pytest-homeassistant-custom-component/${dep_ver}/json" \
            | jq -r '.info.requires_dist[]? | select(startswith("homeassistant"))' | head -1)
          [[ -n "$req" && "$req" != "null" ]] || { echo "No homeassistant requirement found"; exit 0; }

          ha_ver=$(echo "$req" | grep -oE '[0-9]{4}\.[0-9]+\.[0-9]+([a-z]+[0-9]+)?' | head -1)
          [[ -n "$ha_ver" ]] || { echo "No Home Assistant version found"; exit 0; }

          [[ "$ha_ver" =~ ^[0-9]{4}\.[0-9]+\.[0-9]+$ ]] || { echo "Prerelease detected (${ha_ver}), skipping"; exit 0; }

          tmp_file=$(mktemp)
          jq --arg v "$ha_ver" '.homeassistant = $v' hacs.json > "$tmp_file"
          mv "$tmp_file" hacs.json

      - name: Commit updated hacs.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync hacs homeassistant version"
          file_pattern: hacs.json