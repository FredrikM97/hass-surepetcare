name: Validate with hassfest

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'

jobs:
  validate:
    runs-on: "ubuntu-latest"
    if: github.repository_owner == 'FredrikM97'
    steps:
        - uses: "actions/checkout@v6"
        - uses: "home-assistant/actions/hassfest@master"
